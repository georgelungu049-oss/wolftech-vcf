openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contacts
    description: Contact collection operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /contacts:
    post:
      operationId: submitContact
      tags: [contacts]
      summary: Submit a contact
      description: Save a visitor's contact info to the database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitContactRequest"
      responses:
        "201":
          description: Contact saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitContactResponse"
        "409":
          description: Phone number already submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts/stats:
    get:
      operationId: getContactStats
      tags: [contacts]
      summary: Get collection progress
      description: Returns the current count, target, and whether the target has been reached
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactStats"

  /contacts/download:
    get:
      operationId: downloadVcf
      tags: [contacts]
      summary: Download VCF file
      description: Downloads a VCF file of all collected contacts (only available when target is reached)
      responses:
        "200":
          description: VCF file
          content:
            text/vcard:
              schema:
                type: string
        "403":
          description: Target not yet reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SubmitContactRequest:
      type: object
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 100
        phone:
          type: string
          minLength: 5
          maxLength: 30
        email:
          type: string
          maxLength: 200
          nullable: true
        organization:
          type: string
          maxLength: 100
          nullable: true
      required:
        - fullName
        - phone

    SubmitContactResponse:
      type: object
      properties:
        id:
          type: integer
        message:
          type: string
        stats:
          $ref: "#/components/schemas/ContactStats"
      required:
        - id
        - message
        - stats

    ContactStats:
      type: object
      properties:
        count:
          type: integer
        target:
          type: integer
        percentage:
          type: number
        targetReached:
          type: boolean
      required:
        - count
        - target
        - percentage
        - targetReached

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
